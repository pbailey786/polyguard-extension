<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyGuard Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 500px;
      background: #1f2937;
      color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      border-bottom: 2px solid #3b82f6;
      padding-bottom: 8px;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    
    label {
      font-size: 12px;
      font-weight: 500;
      color: #9ca3af;
    }
    
    input, select {
      padding: 8px;
      border: 1px solid #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      color: #f3f4f6;
      border-radius: 4px;
      font-size: 12px;
    }
    
    input::placeholder {
      color: #6b7280;
    }
    
    button {
      padding: 8px 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    
    button:hover {
      background: #2563eb;
    }
    
    button.danger {
      background: #ef4444;
    }
    
    button.danger:hover {
      background: #dc2626;
    }
    
    .orders-list {
      border: 1px solid #3b82f6;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #374151;
      background: rgba(59, 130, 246, 0.05);
    }
    
    .order-item:last-child {
      border-bottom: none;
    }
    
    .order-details {
      flex: 1;
    }
    
    .order-name {
      font-weight: 500;
      font-size: 12px;
    }
    
    .order-price {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }
    
    .empty-state {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 12px;
    }
    
    .wallet-section {
      background: rgba(59, 130, 246, 0.1);
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    
    .wallet-address {
      font-size: 11px;
      word-break: break-all;
      color: #9ca3af;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>⚠️ PolyGuard</h1>
  
  <div class="section wallet-section">
    <label>Connected Wallet</label>
    <div class="wallet-address" id="walletAddress">No wallet connected</div>
    <button id="connectWallet" style="margin-top: 8px;">Connect Wallet (EIP-6963)</button>
  </div>
  
  <div class="section">
    <h2 style="font-size: 14px; margin-bottom: 8px;">Add Stop-Loss Order</h2>
    
    <div class="form-group">
      <label>Market ID</label>
      <input type="text" id="marketId" placeholder="e.g., 0x123abc...">
    </div>
    
    <div class="form-group">
      <label>Market Name</label>
      <input type="text" id="marketName" placeholder="e.g., Trump 2024">
    </div>
    
    <div class="form-group">
      <label>Stop Price ($)</label>
      <input type="number" id="stopPrice" placeholder="0.25" step="0.01" min="0">
    </div>
    
    <button id="addOrderBtn" style="width: 100%;">Add Stop-Loss</button>
  </div>
  
  <div class="section">
    <h2 style="font-size: 14px; margin-bottom: 8px;">Active Orders</h2>
    <div id="ordersList" class="orders-list">
      <div class="empty-state">No active orders</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
