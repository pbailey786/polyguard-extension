<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyGuard - Stop-Loss Orders</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      font-size: 14px;
    }
    
    body {
      width: 480px;
      min-height: 400px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      padding: 0;
      margin: 0;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      padding: 16px;
      border-bottom: 2px solid #1e40af;
      text-align: center;
    }
    
    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    .header .version {
      margin: 4px 0 0 0;
      font-size: 11px;
      opacity: 0.8;
    }
    
    /* Sections */
    section {
      padding: 16px;
      border-bottom: 1px solid rgba(59, 130, 246, 0.1);
    }
    
    section h3 {
      margin: 0 0 12px 0;
      font-size: 12px;
      font-weight: 600;
      color: #60a5fa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Market Section */
    .market-card {
      background: rgba(59, 130, 246, 0.05);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 6px;
      padding: 12px;
    }
    
    .market-field {
      margin-bottom: 8px;
    }
    
    .market-field:last-child {
      margin-bottom: 0;
    }
    
    .market-field label {
      display: block;
      font-size: 10px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 2px;
    }
    
    .market-value {
      margin: 0;
      font-size: 13px;
      color: #e2e8f0;
      font-weight: 500;
    }
    
    .market-value.highlight {
      color: #60a5fa;
      font-weight: 600;
      font-size: 14px;
    }
    
    .market-value.monospace {
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 11px;
    }
    
    .market-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    
    /* Info Box */
    .info-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 4px;
      padding: 8px;
      margin: 0;
    }
    
    .info-box p {
      margin: 0;
      font-size: 12px;
      color: #fecaca;
    }
    
    /* Not Polymarket */
    .not-polymarket {
      padding: 40px 20px;
      text-align: center;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .not-polymarket .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    .not-polymarket h2 {
      margin: 0 0 4px 0;
      font-size: 16px;
      color: #e2e8f0;
    }
    
    .not-polymarket .subtitle {
      margin: 0 0 16px 0;
      font-size: 12px;
      color: #94a3b8;
    }
    
    .not-polymarket .message {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #e2e8f0;
      font-weight: 500;
    }
    
    .not-polymarket .hint {
      margin: 0;
      font-size: 11px;
      color: #64748b;
    }
    
    /* Loading */
    .loading {
      padding: 40px 20px;
      text-align: center;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 12px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading p {
      margin: 0;
      color: #94a3b8;
    }
    
    /* Form */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }
    
    .form-group label {
      font-size: 11px;
      font-weight: 600;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    
    .suggestion {
      margin: 0;
      font-size: 11px;
      color: #94a3b8;
    }
    
    .suggestion strong {
      color: #60a5fa;
      font-weight: 600;
    }
    
    input[type="number"] {
      padding: 8px 10px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 13px;
      font-family: 'Monaco', 'Courier New', monospace;
    }
    
    input[type="number"]:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
    }
    
    /* Buttons */
    button {
      padding: 10px 12px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    button:hover:not(:disabled) {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    button.btn-primary {
      width: 100%;
    }
    
    button.btn-remove {
      padding: 6px 8px;
      background: rgba(239, 68, 68, 0.8);
      color: white;
      border: none;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
    }
    
    button.btn-remove:hover {
      background: #dc2626;
    }
    
    /* Orders */
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .order-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 4px;
      padding: 10px;
      gap: 8px;
    }
    
    .order-info {
      flex: 1;
    }
    
    .order-market {
      margin: 0 0 2px 0;
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
    }
    
    .order-details {
      margin: 0 0 2px 0;
      font-size: 11px;
      color: #94a3b8;
    }
    
    .order-details strong {
      color: #60a5fa;
      font-weight: 600;
    }
    
    .order-id {
      margin: 0;
      font-size: 10px;
      color: #64748b;
      font-family: 'Monaco', 'Courier New', monospace;
    }
    
    .empty-state {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 12px;
    }
    
    /* Footer */
    .footer {
      padding: 12px 16px;
      text-align: center;
      border-top: 1px solid rgba(59, 130, 246, 0.1);
      background: rgba(0, 0, 0, 0.2);
      font-size: 11px;
      color: #94a3b8;
    }
    
    .footer .status {
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>🎩 PolyGuard</h1>
      <p class="version">v1.0.0</p>
    </div>
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
